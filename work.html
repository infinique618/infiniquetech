  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --line: rgba(255,255,255,0.1);
      --glass: rgba(255,255,255,0.04);
      --glass-strong: rgba(255,255,255,0.4);
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      overflow-x: hidden;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    body, p, a, span, button, input, textarea, li {
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
    }

    .page-shell {
      min-height: 100vh;
      background: #000;
    }

    .nav-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 64px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      max-width: 160px;
    }

    .nav-brand svg {
      display: block;
      width: 100%;
      max-width: 96px;
      height: auto;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .nav-links a:hover {
      background: #444;
    }

    .nav-links a.is-active {
      background: #fff;
      color: #000;
    }

    /* ── Lang toggle ── */
    .lang-wrap { position: relative; }

    .lang-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 36px;
      padding: 0 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      background: none;
      border: none;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .lang-btn:hover { background: rgba(255,255,255,0.08); }

    #langDropdown {
      display: none;
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      min-width: 132px;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      overflow: hidden;
      z-index: 100;
    }

    #langDropdown a {
      display: block;
      padding: 10px 16px;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.2s;
      min-height: auto;
      border-radius: 0;
    }

    #langDropdown a:hover { background: rgba(255,255,255,0.1); }

    /* ── Nav toggle (hamburger) ── */
    .nav-toggle {
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      gap: 4px;
      flex-shrink: 0;
    }

    .nav-toggle span {
      display: block;
      width: 18px;
      height: 2px;
      background: #fff;
      border-radius: 999px;
      transition: transform 0.2s ease, opacity 0.2s ease;
      transform-origin: center;
    }

    .work-page {
      width: 100%;
      padding: 132px 24px 80px;
    }

    .work-inner {
      width: 100%;
      max-width: 1920px;
      margin: 0 auto;
    }

    .work-hero {
      position: relative;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 32px;
      margin-bottom: 34px;
      padding-bottom: 60px;
    }
    .work-hero::after {
      content: '';
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 100vw;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }

    .work-kicker {
      margin: 0 0 10px;
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.58);
    }

    .work-title {
      margin: 0;
      font-family: 'Barlow Condensed', 'Arial Narrow', 'Helvetica Neue', sans-serif !important;
      font-size: clamp(48px, 8vw, 108px);
      font-weight: 500;
      line-height: 0.92;
      letter-spacing: -0.03em;
      text-transform: uppercase;
    }

    .work-copy {
      max-width: 1200px;
      margin: 0;
      font-size: 16px;
      line-height: 1.65;
      color: rgba(255,255,255,0.76);
    }

    @media (max-width: 1200px) {
      .work-copy { font-size: 14px; line-height: 1.75; }
    }

    .work-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 0 0 28px;
    }

    .work-tab {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.7);
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 600;
      line-height: 1;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    .work-tab:hover {
      border-color: rgba(255,255,255,0.28);
      color: #fff;
    }

    .work-tab.is-active {
      background: #fff;
      border-color: #fff;
      color: #000;
    }

    .work-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    .work-card {
      cursor: pointer;
    }

    .work-card.is-hidden {
      display: none;
    }

    .card-frame {
      position: relative;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border-radius: 10px;
      background: #101010;
      box-shadow: 0 6px 30px rgba(0,0,0,0.7);
    }

    .card-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.7s ease-out;
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    .work-card:hover .card-frame img {
      transform: scale(1.05);
    }

    .work-card:hover .card-overlay {
      opacity: 0;
    }

    .card-meta {
      position: absolute;
      right: 12px;
      bottom: 12px;
      left: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 42px;
      padding: 10px 16px;
      border: 1px solid rgba(255,255,255,0.34);
      border-radius: 15px;
      background: rgba(255,255,255,0.02);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .card-name,
    .card-type {
      font-size: 14px;
      color: #fff;
      white-space: nowrap !important;
      overflow: hidden !important;
      text-overflow: ellipsis !important;
      overflow-wrap: normal !important;
      word-break: normal !important;
      min-width: 0;
    }

    .card-name {
      font-weight: 500;
      flex: 1 1 auto;
    }
    .card-type {
      flex: 0 0 auto;
    }

    #imgModal {
      position: fixed;
      inset: 0;
      display: none;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.3s ease;
      backdrop-filter: blur(8px);
    }

    #imgModal button {
      position: absolute;
      z-index: 10001;
      border: none;
      background: none;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    #imgModal #modalClose {
      top: 24px;
      right: 24px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      font-size: 32px;
    }

    #imgModal .modal-nav {
      top: 50%;
      transform: translateY(-50%);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.08);
    }
    #imgModal .modal-prev { left: 24px; }
    #imgModal .modal-next { right: 24px; }

    #imgModal button:hover {
      background: rgba(255,255,255,0.18);
    }

    @media (max-width: 640px) {
      #imgModal .modal-nav { width: 44px; height: 44px; }
      #imgModal .modal-prev { left: 12px; }
      #imgModal .modal-next { right: 12px; }
    }

    .modal-stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 40px;
    }

    #modalImg {
      max-width: min(92vw, 1280px);
      max-height: 80vh;
      object-fit: contain;
      border-radius: 18px;
      box-shadow: 0 20px 80px rgba(0,0,0,0.55);
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }

    #modalInfo {
      margin-top: 16px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s ease 0.1s;
    }

    #modalName {
      color: #fff;
      font-size: 18px;
      font-weight: 600;
    }

    #modalType {
      color: rgba(255,255,255,0.6);
      font-size: 16px;
    }

    @media (max-width: 1440px) {
      .work-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 1100px) {
      .work-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 768px) {
      .nav-bar { padding: 12px 16px; }

      .nav-toggle { display: flex; margin-left: auto; }

      .nav-links {
        display: none !important;
        position: absolute;
        top: calc(100% + 8px);
        left: 14px;
        right: 14px;
        padding: 12px;
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 14px;
        background: rgba(0,0,0,0.92);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
        z-index: 60;
        box-shadow: 0 20px 40px rgba(0,0,0,0.45);
      }

      .nav-bar.nav-open .nav-links { display: flex !important; }

      .nav-links a, .lang-wrap { width: 100%; }

      .nav-links a {
        justify-content: flex-start;
        padding: 12px 14px;
        border-radius: 12px;
      }

      .lang-btn {
        width: 100%;
        justify-content: flex-start;
        padding: 12px 14px;
        border-radius: 12px;
      }

      #langDropdown {
        position: static;
        margin-top: 4px;
        min-width: 0;
        border: none;
        background: rgba(255,255,255,0.04);
        backdrop-filter: none;
        box-shadow: none;
      }

      .lang-wrap.lang-open #langDropdown { display: block; }

      .nav-bar.nav-open .nav-toggle span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
      .nav-bar.nav-open .nav-toggle span:nth-child(2) { opacity: 0; }
      .nav-bar.nav-open .nav-toggle span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

      .work-page {
        padding: 108px 16px 64px;
      }

      .work-hero {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }

      .work-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .work-tabs {
        gap: 8px;
        margin-bottom: 22px;
      }

      .work-tab {
        padding: 9px 14px;
        font-size: 12px;
      }

      .card-meta {
        padding: 9px 14px;
      }
    }

    @media (max-width: 499px) {
      .work-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
      }
      .card-meta {
        right: 8px;
        bottom: 8px;
        left: 8px;
        padding: 7px 10px;
        gap: 6px;
        min-height: 34px;
        border-radius: 10px;
      }
      .card-name, .card-type {
        font-size: 11px;
      }
    }

    .footer {
      padding: 16px 24px 80px;
    }

    .footer-inner {
      max-width: 1920px;
      margin: 0 auto;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      color: rgba(255,255,255,0.62);
      font-size: 14px;
    }

    .footer a {
      color: rgba(255,255,255,0.82);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .footer a:hover { color: #fff; }

    @media (max-width: 768px) {
      .footer { padding: 8px 16px 56px; }
      .footer-inner { flex-direction: column; align-items: flex-start; }
    }

    @media (min-width: 769px) {
      .nav-links { display: flex !important; }
      .nav-toggle { display: none !important; }
    }
  
    /* Footer responsive */
    @media (max-width: 768px) {
      .footer-main-row {
        flex-direction: column !important;
        align-items: flex-start !important;
        gap: 32px !important;
      }
      .footer-main-row > div:last-child {
        align-items: flex-start !important;
      }
      .footer-addr {
        flex-wrap: wrap !important;
        white-space: normal !important;
      }
    }

        navToggle.innerHTML = '<span></span><span></span><span></span>';
        navBar.appendChild(navToggle);
        navToggle.addEventListener('click', function(e){
          e.stopPropagation();
          var open = navBar.classList.toggle('nav-open');
          navToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
          if (!open) closeLang();
        });
      }
      if (btn && dd) {
        btn.addEventListener('click', function(e){
          e.stopPropagation();
          if (mobileQuery.matches && langWrap) {
            var isOpen = langWrap.classList.toggle('lang-open');
            dd.style.display = isOpen ? 'block' : 'none';
            return;
          }
          dd.style.display = dd.style.display === 'block' ? 'none' : 'block';
        });
      }
      document.addEventListener('click', function(e){
        closeLang();
        if (navBar && navBar.classList.contains('nav-open') && navToggle && !navBar.contains(e.target)) closeMenu();
      });
      if (mobileQuery.addEventListener) { mobileQuery.addEventListener('change', syncNavMode); }
      else if (mobileQuery.addListener) { mobileQuery.addListener(syncNavMode); }
      window.addEventListener('resize', syncNavMode);
      syncNavMode();
    })();
    function setLang(lang){
      if (lang === 'en') { window.location.href = './en/work.html'; return; }
      var dropdown = document.getElementById('langDropdown');
      var label = document.getElementById('langLabel');
      if (dropdown) { dropdown.style.display = 'none'; if (dropdown.parentElement) dropdown.parentElement.classList.remove('lang-open'); }
      if (label) label.textContent = lang.toUpperCase();
    }

    (function () {
      var modal = document.getElementById('imgModal');
      var modalImg = document.getElementById('modalImg');
      var modalName = document.getElementById('modalName');
      var modalType = document.getElementById('modalType');
      var modalInfo = document.getElementById('modalInfo');
      var modalClose = document.getElementById('modalClose');
      var modalPrev = document.getElementById('modalPrev');
      var modalNext = document.getElementById('modalNext');
      var filterTabs = Array.prototype.slice.call(document.querySelectorAll('.work-tab'));
      var grid = document.getElementById('workGrid');

      if (!modal || !modalImg || !modalName || !modalType || !modalInfo || !modalClose || !grid) return;

      var currentCard = null;

      function visibleCards() {
        return Array.prototype.slice.call(grid.querySelectorAll('.work-card'))
          .filter(function(c) { return !c.classList.contains('is-hidden'); });
      }

      function showCard(card) {
        if (!card) return;
        currentCard = card;
        var img = card.querySelector('img');
        var name = card.querySelector('.card-name');
        var type = card.querySelector('.card-type');
        if (!img) return;
        var fullSrc = card.getAttribute('data-full') || img.src;
        modalImg.src = fullSrc;
        modalImg.alt = name ? name.textContent : '';
        modalName.textContent = name ? name.textContent : '';
        modalType.textContent = type ? type.textContent : '';
      }

      function openModal(card) {
        showCard(card);
        modal.style.display = 'block';
        requestAnimationFrame(function () {
          modal.style.opacity = '1';
          modalImg.style.transform = 'scale(1)';
          modalInfo.style.opacity = '1';
        });
      }

      function closeModal() {
        modal.style.opacity = '0';
        modalImg.style.transform = 'scale(0.9)';
        modalInfo.style.opacity = '0';
        window.setTimeout(function () {
          modal.style.display = 'none';
          modalImg.src = '';
          currentCard = null;
        }, 300);
      }

      function navigate(dir) {
        if (!currentCard) return;
        var cards = visibleCards();
        var idx = cards.indexOf(currentCard);
        if (idx === -1) return;
        var next = cards[(idx + dir + cards.length) % cards.length];
        showCard(next);
      }

      function applyFilter(filter) {
        filterTabs.forEach(function (tab) {
          tab.classList.toggle('is-active', tab.getAttribute('data-filter') === filter);
        });
        Array.prototype.forEach.call(grid.querySelectorAll('.work-card'), function (card) {
          var matches = filter === 'all' || card.getAttribute('data-category') === filter;
          card.classList.toggle('is-hidden', !matches);
        });
      }

      filterTabs.forEach(function (tab) {
        tab.addEventListener('click', function () {
          applyFilter(tab.getAttribute('data-filter') || 'all');
        });
      });

      grid.addEventListener('click', function(e) {
        var card = e.target.closest && e.target.closest('.work-card');
        if (!card) return;
        openModal(card);
      });

      modal.addEventListener('click', function (e) {
        if (e.target === modal || e.target === modal.querySelector('.modal-stage')) {
          closeModal();
        }
      });

      modalClose.addEventListener('click', closeModal);
      if (modalPrev) modalPrev.addEventListener('click', function(e) { e.stopPropagation(); navigate(-1); });
      if (modalNext) modalNext.addEventListener('click', function(e) { e.stopPropagation(); navigate(1); });
      document.addEventListener('keydown', function (e) {
        if (modal.style.display !== 'block') return;
        if (e.key === 'Escape') closeModal();
        else if (e.key === 'ArrowLeft') navigate(-1);
        else if (e.key === 'ArrowRight') navigate(1);
      });
    })();
  </script>
</body>
</html>
